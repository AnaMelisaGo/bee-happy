<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" data-bs-theme="dark">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">Cerrar sesión</h1>
                <button type="button" class="btn-close hvr-grow" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                ¿Está seguro que quiere cerrar sesión?
            </div>
            <div class="modal-footer">
                <a href="{% url 'logout' %}" class="btn btn-danger hvr-grow">Cerrar sesión</a>
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            </div>
        </div>
    </div>
</div>
